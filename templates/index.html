<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Namma Metro Fare Calculator</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">
  <style>
    body { background-color: #f4f5f7; }
    .fare-amount { font-size: 3rem; font-weight: 700; line-height: 1; }
    .journey-label { font-size: 1.1rem; font-weight: 600; }
    .swap-btn { cursor: pointer; }
  </style>
</head>
<body>
  <div class="container py-4 py-md-5" style="max-width: 540px;">

    <h1 class="text-center mb-4">🚇 Namma Metro Fare Calculator</h1>

    <div class="card shadow-sm">
      <div class="card-body p-4">

        <div class="mb-3">
          <label for="source" class="form-label fw-semibold">From</label>
          <select id="source" class="form-select">
            {% for line, stations in stations_by_line.items() %}
            <optgroup label="{{ line }} Line">
              {% for s in stations %}
              <option value="{{ s.name }}">{{ s.name }}</option>
              {% endfor %}
            </optgroup>
            {% endfor %}
          </select>
        </div>

        <div class="text-center mb-2">
          <span id="swap" class="swap-btn badge bg-secondary">&#8593;&#8595; Swap</span>
        </div>

        <div class="mb-3">
          <label for="destination" class="form-label fw-semibold">To</label>
          <select id="destination" class="form-select">
            {% for line, stations in stations_by_line.items() %}
            <optgroup label="{{ line }} Line">
              {% for s in stations %}
              <option value="{{ s.name }}">{{ s.name }}</option>
              {% endfor %}
            </optgroup>
            {% endfor %}
          </select>
        </div>

        <div class="d-grid">
          <button id="calculate" class="btn btn-primary btn-lg">Calculate Fare</button>
        </div>

        <div id="error" class="alert alert-danger mt-3 d-none" role="alert"></div>

        <div id="result" class="text-center mt-4 d-none">
          <div class="journey-label text-secondary mb-2">
            <span id="r-source"></span> &rarr; <span id="r-destination"></span>
          </div>
          <div class="fare-amount text-primary">&#8377;<span id="r-fare"></span></div>
          <div class="text-muted mt-1">Distance: <span id="r-distance"></span> km</div>
          <div id="r-journey" class="mt-2"></div>
          <div id="r-interchanges" class="text-muted small mt-1"></div>
        </div>

      </div>
    </div>

    <p class="text-center text-muted small mt-3 mb-0">
      Fares are estimates based on BMRCL distance slabs.
    </p>
  </div>

  <script>
    const sourceEl = document.getElementById('source');
    const destEl = document.getElementById('destination');
    const errorEl = document.getElementById('error');
    const resultEl = document.getElementById('result');

    // Default the "To" dropdown to a different station than "From".
    if (destEl.options.length > 1) destEl.selectedIndex = destEl.options.length - 1;

    document.getElementById('swap').addEventListener('click', () => {
      const tmp = sourceEl.value;
      sourceEl.value = destEl.value;
      destEl.value = tmp;
    });

    document.getElementById('calculate').addEventListener('click', async () => {
      errorEl.classList.add('d-none');
      resultEl.classList.add('d-none');

      const source = sourceEl.value;
      const destination = destEl.value;
      const url = `/api/fare?source=${encodeURIComponent(source)}`
                + `&destination=${encodeURIComponent(destination)}`;

      try {
        const resp = await fetch(url);
        const data = await resp.json();

        if (!resp.ok) {
          errorEl.textContent = data.error || 'Something went wrong.';
          errorEl.classList.remove('d-none');
          return;
        }

        document.getElementById('r-source').textContent = data.source;
        document.getElementById('r-destination').textContent = data.destination;
        document.getElementById('r-fare').textContent = data.fare;
        document.getElementById('r-distance').textContent = data.distance_km;

        const journeyEl = document.getElementById('r-journey');
        const interchangesEl = document.getElementById('r-interchanges');

        if (data.is_same_line) {
          journeyEl.innerHTML =
            '<span class="badge bg-success">Direct journey &mdash; no line change</span>';
          interchangesEl.textContent = '';
        } else {
          const count = data.interchanges.length;
          journeyEl.innerHTML =
            `<span class="badge bg-warning text-dark">Requires ${count} line `
            + `change${count > 1 ? 's' : ''}</span>`;
          interchangesEl.textContent = 'Change at: ' + data.interchanges.join(', ');
        }

        resultEl.classList.remove('d-none');
      } catch (e) {
        errorEl.textContent = 'Could not reach the server. Is the app running?';
        errorEl.classList.remove('d-none');
      }
    });
  </script>
</body>
</html>
